<!doctype html>
<html lang="zxx">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="static/assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/assets/css/animate.min.css">
    <link rel="stylesheet" href="static/assets/css/flaticon.css">
    <link rel="stylesheet" href="static/assets/css/bootstrap-icons.css">
    <link rel="stylesheet" href="static/assets/css/fontawesome.min.css">
    <link rel="stylesheet" href="static/assets/css/meanmenu.css">
    <link rel="stylesheet" href="static/assets/css/magnific-popup.min.css">
    <link rel="stylesheet" href="static/assets/css/swiper.min.css">
    <link rel="stylesheet" href="static/assets/css/owl.carousel.min.css">
    <link rel="stylesheet" href="static/assets/css/style.css">
    <link rel="stylesheet" href="static/assets/css/responsive.css">
</head>

<body>

<!-- Preloader -->
<div id="preloader">
    <div id="preloader-center"></div>
</div>

<!-- Navbar -->
<div class="navbar-area">
    <div class="optimize-nav">
        <div class="container">
            <nav class="navbar navbar-expand-md navbar-light">
                <a class="navbar-brand" href="#">
                    <img src="static/assets/img/logo-black.png" alt="logo">
                </a>

                <div class="collapse navbar-collapse mean-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a href="/index" class="nav-link">Detection</a></li>
                        <li class="nav-item"><a href="/about" class="nav-link">Graph</a></li>
                        <li class="nav-item"><a href="/notebook" class="nav-link">Notebook</a></li>
                    </ul>
                    <div class="other-option">
                        <a class="default-btn" href="/login">Signout <span></span></a>
                    </div>
                </div>
            </nav>
        </div>
    </div>
</div>

<!-- Slider -->
<header class="slider slider-prlx">
    <div class="swiper-container parallax-slider">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <div class="bg-img valign" data-background="static/assets/img/slider-3.jpg" data-overlay-dark="5">
                    <div class="container">
                        <div class="caption text-center">
                            <h1>Welcome to Dashboard!</h1>
                            <p>Deep learning real time Railway Obstruction Detection </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>
</header>

<!-- Detection Section -->
<section class="about-section section-padding">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-12 text-center">

                <h2 class="mb-4">Detection Options</h2>

                <!-- Upload Section -->
                <form method="post" enctype="multipart/form-data" action="/predict2">
                    <div class="form-group mb-3">
                        <input type="file" class="form-control" name="file" required>
                    </div>
                    <button type="submit" class="default-btn">
                        Upload and Detect
                        <span></span>
                    </button>
                </form>

                <br><br>

                <!-- Live Detection -->
                <button onclick="startLive()" class="default-btn">
                    Start Live Detection
                    <span></span>
                </button>

                <div id="liveBox" style="display:none; margin-top:20px;">
                    <img src="/video_feed" width="75%" class="img-fluid rounded">
                </div>

            </div>
        </div>
    </div>
</section>

<!-- Go Top -->
<div class="go-top">
    <i class="fas fa-chevron-up"></i>
    <i class="fas fa-chevron-up"></i>
</div>

<!-- JS -->
<script src="static/assets/js/jquery.min.js"></script>
<script src="static/assets/js/popper.min.js"></script>
<script src="static/assets/js/bootstrap.bundle.min.js"></script>
<script src="static/assets/js/jquery.meanmenu.js"></script>
<script src="static/assets/js/jquery.appear.min.js"></script>
<script src="static/assets/js/jquery.waypoints.min.js"></script>
<script src="static/assets/js/jquery.counterup.min.js"></script>
<script src="static/assets/js/jquery.magnific-popup.min.js"></script>
<script src="static/assets/js/owl.carousel.min.js"></script>
<script src="static/assets/js/swiper.min.js"></script>
<script src="static/assets/js/wow.min.js"></script>
<script src="static/assets/js/main.js"></script>

<!-- Live Detection Script -->
<script>
function startLive() {
    document.getElementById("liveBox").style.display = "block";
}
</script>

</body>
</html>
