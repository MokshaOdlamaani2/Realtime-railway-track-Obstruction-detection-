</div>

<!-- Navbar -->
<div class="navbar-area">
    <div class="optimize-nav">
        <div class="container">
            <nav class="navbar navbar-expand-md navbar-light">
                <a class="navbar-brand" href="#">
                    <img src="{{ url_for('static', filename='assets/img/logo-black.png') }}" alt="logo">
                </a>

                <div class="collapse navbar-collapse mean-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a href="/index" class="nav-link">Detection</a>
                        </li>
                        <li class="nav-item">
                            <a href="/about" class="nav-link">Graph</a>
                        </li>
                        <li class="nav-item">

                    </ul>

                    </div>

            </nav>
        </div>

<!-- Slider -->

    <div class="swiper-container parallax-slider">

                <div class="bg-img valign"
                     data-background="{{ url_for('static', filename='assets/img/slider-3.jpg') }}"
                     data-overlay-dark="5">
                    <div class="container">
                        <div class="caption text-center">
                            <h1>Detection Result</h1>
                            <p>Processed Image Output</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>
</header>

<section class="about-section section-padding">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-12 text-center">

                <h2 class="mb-4">Detected Output</h2>

                <!-- Display Processed Image -->
                <img src="{{ url_for('static', filename=image_file) }}"
                     class="img-fluid rounded shadow"
                     alt="Detection Result">

                <br><br>

                <!-- Back Button -->
                <a href="/index" class="default-btn">
                    Back to Dashboard
                    <span></span>
                </a>

            </div>
        </div>
    </div>

<!-- Go Top -->
<div class="go-top">
    <i class="fas fa-chevron-up"></i>
    <i class="fas fa-chevron-up"></i>
